name: Keep app warm

# Pings the live Streamlit app on a schedule so the Community Cloud container
# never goes to sleep for inactivity — visitors then hit a warm app with its
# data cache already populated (no cold boot, no ~10s reload from scratch).
#
# NOTE: this is fully effective only when the app is PUBLIC. While the app is
# private, an unauthenticated ping is bounced (HTTP 303) at the login gateway
# before it reaches the container, so it can't keep the container warm.
# Flip Streamlit → Settings → Sharing → Public to activate this (that also lets
# the team open the app).

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay under load)
  workflow_dispatch:         # allows a manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120 Safari/537.36"
          URL="https://peanuts-blr.streamlit.app"
          JAR="$(mktemp)"
          # Streamlit Community Cloud public apps run an anonymous-session
          # handshake (redirects that set a cookie) before serving the app; a
          # plain request loops on it. Carry a cookie jar so we complete the
          # handshake like a real browser and actually reach the container —
          # THAT is what registers as activity and keeps it awake.
          for path in "/" "/_stcore/health"; do
            code=$(curl -s -A "$UA" -c "$JAR" -b "$JAR" -L --max-redirs 30 \
              --max-time 60 -o /dev/null -w "%{http_code}" "$URL$path" || echo "000")
            echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')  $path -> $code"
          done
          rm -f "$JAR"
